name: ImageClassifier
options:
  bundleIdPrefix: io.github.izzaldev
  deploymentTarget:
    iOS: "17.0"

packages:
  HotSwiftUI:
    github: johnno1962/HotSwiftUI
    from: 1.2.5
  InjectionLite:
    github: johnno1962/InjectionLite
    branch: main

targets:
  ImageClassifier:
    type: application
    platform: iOS
    sources:
      - Sources
      - Resources
    dependencies:
      - package: HotSwiftUI
      - package: InjectionLite
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.github.izzaldev.imageclassifier
        SWIFT_VERSION: 6.0
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        EMIT_FRONTEND_COMMAND_LINES: YES
      configs:
        debug:
          SWIFT_COMPILATION_MODE: incremental
          OTHER_LDFLAGS:
            - $(inherited)
            - "-Xlinker"
            - "-interposable"
        release:
          SWIFT_COMPILATION_MODE: wholemodule
schemes:
  ImageClassifier:
    build:
      targets:
        ImageClassifier: all
    run:
      environmentVariables:
        INJECTION_DIRECTORIES: $SRCROOT
